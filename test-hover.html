<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Test</title>
    <style>
        .test-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        .profile-image {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .profile-image:hover {
            transform: scale(1.05);
            border: 3px solid #667eea;
        }

        .profile-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        .profile-image .profile-default {
            opacity: 1;
            z-index: 1;
        }

        .profile-image .profile-hover {
            opacity: 0;
            z-index: 2;
        }

        .profile-image:hover .profile-hover {
            opacity: 1 !important;
        }

        .profile-image:hover .profile-default {
            opacity: 0 !important;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="profile-image">
            <img class="profile-default" src="assets/Screenshot_20250202_164718_Photo Editor.jpg" alt="Profile">
            <img class="profile-hover" src="assets/Screenshot_20250421_112742_Gallery.jpg" alt="Profile alternate">
        </div>
    </div>
</body>
</html>
